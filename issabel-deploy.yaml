apiVersion: apps/v1
kind: Deployment
metadata:
  name: issabel
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: issabel
  template:
    metadata:
      labels:
        app: issabel
    spec:
      # Use hostNetwork to avoid SIP/RTP NAT issues
      hostNetwork: true
      containers:
      - name: issabel
        image: issabel/issabel:latest
        securityContext:
          privileged: true # Issabel needs this to manage Asterisk kernel modules
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        ports:
        - containerPort: 80
        - containerPort: 443
        - containerPort: 5060
          protocol: UDP
