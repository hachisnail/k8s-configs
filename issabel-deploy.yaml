apiVersion: apps/v1
kind: Deployment
metadata:
  name: issabel
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: issabel
  template:
    metadata:
      labels:
        app: issabel
    spec:
      hostNetwork: true
      # This ensures Kubernetes puts one pod on the Master and one on the Worker.
      # Without this, both might try to land on the same node and fail due to Port 80 conflict.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - issabel
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: issabel
        image: renatosiqueira/issabel:latest
        securityContext:
          privileged: true 
        # Adding limits prevents Issabel from crashing your 2GB worker node.
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: cgroups
          mountPath: /sys/fs/cgroup
          readOnly: true
        - name: run-dir
          mountPath: /run
      volumes:
      - name: cgroups
        hostPath:
          path: /sys/fs/cgroup
      - name: run-dir
        hostPath:
          path: /run
