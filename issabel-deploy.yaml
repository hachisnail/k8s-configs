apiVersion: apps/v1
kind: Deployment
metadata:
  name: issabel
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: issabel
  template:
    metadata:
      labels:
        app: issabel
    spec:
      hostNetwork: true
      containers:
      - name: issabel
        image: renatosiqueira/issabel:latest  # Updated image
        securityContext:
          privileged: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        ports:
        - containerPort: 80
        - containerPort: 443
        - containerPort: 5060
          protocol: UDP
